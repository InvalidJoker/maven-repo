ktor:
  deployment:
    port: 8080
  application:
    modules:
      - de.joker.ApplicationKt.configure
      - de.joker.DatabasesKt.configureDatabases
      - de.joker.AuthKt.configureAuth
      - de.joker.RoutingKt.configureRouting
      - de.joker.FrontendKt.configureFrontend

database:
  # Selects the active database backend: "h2" (embedded file) or "postgres".
  type: "$DATABASE_TYPE:h2"

  # Used when type = h2. Path is relative to the working directory (".mv.db" is appended).
  h2:
    file: "$DATABASE_H2_FILE:./data/maven-repo"

  # Used when type = postgres.
  postgres:
    host: "$DATABASE_HOST:localhost"
    port: "$DATABASE_PORT:5432"
    database: "$DATABASE_NAME:maven_repo"
    user: "$DATABASE_USER:postgres"
    password: "$DATABASE_PASSWORD:postgres"

instance:
  # Folder for instance settings (branding name + icon), stored as files, not in the database.
  dataPath: "$DATA_PATH:./data/instance"
  demo: "$DEMO:false"

storage:
  # Selects the active storage backend: "local" (local file system) or "s3".
  type: "$STORAGE_TYPE:local"

  # Used when type = local. Path is relative to the working directory.
  local:
    # Filesystem location where artifacts are stored, one subdirectory per repository.
    path: "$STORAGE_PATH:./data/repositories"

  s3:
    # S3 bucket name where artifacts are stored, one prefix per repository.
    bucket: "$S3_BUCKET:my-maven-repo"
    # Region where the bucket is located.
    region: "$S3_REGION:us-east-1"
    # Access key ID / secret access key for the bucket.
    accessKeyId: "$S3_ACCESS_KEY_ID:your-access-key-id"
    secretAccessKey: "$S3_SECRET_ACCESS_KEY:your-secret-access-key"
    # Custom S3 endpoint for S3-compatible stores (MinIO, R2, Backblaze, ...).
    endpoint: "$S3_ENDPOINT:"

auth:
  session:
    # Key used to sign session cookies. MUST be overridden in production.
    secret: "$SESSION_SECRET:change-me-to-a-long-random-secret-value"
    # Cookie lifetime in seconds (default 7 days).
    maxAgeSeconds: "$SESSION_MAX_AGE:604800"

  # OpenID Connect SSO (Authentik, Pocket ID, Keycloak, ...). Leave clientId blank to disable.
  # Register the redirect URI <base-url>/auth/oidc/callback with your provider.
  oidc:
    issuer: "$OIDC_ISSUER:"
    clientId: "$OIDC_CLIENT_ID:"
    clientSecret: "$OIDC_CLIENT_SECRET:"
    scopes: "$OIDC_SCOPES:openid profile email"
    buttonLabel: "$OIDC_BUTTON_LABEL:Sign in with SSO"

  # Admin user seeded on first boot when the users table is empty.
  admin:
    username: "$ADMIN_USERNAME:admin"
    # regenerate and re-print the admin password
    resetPassword: "$ADMIN_RESET_PASSWORD:false"
    # overwrite the admin password with this value (only used when resetPassword is true or first install)
    password: ${ADMIN_PASSWORD:-}
