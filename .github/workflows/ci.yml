name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Builds backend + frontend and runs tests. The frontend build (tsc + vite)
      # runs via bun, which is on PATH from setup-bun.
      - name: Build
        run: ./gradlew build --no-daemon
